<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>// TERM-CHAT 10.9 \\</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --term-green: #22c55e; --term-yellow: #eab308; --term-bg: #050505; --term-alert: #ef4444; }
        body { background: var(--term-bg); color: var(--term-green); font-family: 'Courier New', monospace; }
        .neon-border { border: 1px solid var(--term-green); box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <!-- MAINTENANCE GATE -->
    <div id="maintenance-screen" class="hidden fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center text-center p-8">
        <div class="text-4xl font-black text-yellow-500 mb-4 tracking-tighter">MAINTENANCE_MODE</div>
        <p class="text-zinc-400 font-mono text-xs">SYSTEM_DIAGNOSTICS_IN_PROGRESS</p>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="absolute inset-0 flex items-center justify-center p-4">
        <div class="w-full max-w-sm neon-border p-8 bg-black">
            <h1 class="text-4xl font-black text-center mb-8">TERM-CHAT</h1>
            <div id="auth-forms" class="space-y-4">
                <button onclick="authGoogle()" class="w-full border border-green-600 p-3 hover:bg-green-600 hover:text-black uppercase font-bold text-[10px]">ACCESS_VIA_GOOGLE</button>
                <input id="email-field" type="email" placeholder="EMAIL" class="w-full bg-transparent border border-green-900 p-3 outline-none text-xs">
                <input id="pass-field" type="password" placeholder="KEY" class="w-full bg-transparent border border-green-900 p-3 outline-none text-xs">
                <button onclick="signInEmail()" class="w-full border border-green-800 p-3 hover:bg-green-800 uppercase font-bold text-[10px]">VALIDATE_CREDENTIALS</button>
            </div>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden h-full flex">
        <div id="sidebar" class="w-64 border-r border-green-900 bg-black p-4">
            <div id="my-id-display" class="font-bold mb-4">...</div>
            <button id="admin-panel-btn" onclick="openAdminPanel()" class="hidden w-full border border-yellow-600 text-yellow-500 py-2 mb-4 uppercase text-[10px]">ADMIN_CONSOLE</button>
            <div id="channel-list"></div>
        </div>
        <div class="flex-1 flex flex-col">
            <div id="msg-container" class="flex-1 overflow-y-auto p-4"></div>
            <form onsubmit="sendMessage(event)" class="p-4 border-t border-green-900">
                <input id="msg-input" type="text" class="w-full bg-transparent outline-none uppercase" placeholder="TRANSMIT_DATA...">
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = { /* ... Your Config ... */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.signInEmail = async () => {
            const email = document.getElementById('email-field').value;
            const pass = document.getElementById('pass-field').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert("ACCESS_DENIED: " + e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            const maintenance = document.getElementById('maintenance-screen');
            onSnapshot(doc(db, '_diagnostics', 'online'), (snap) => {
                const online = snap.data()?.online;
                const isAdmin = user && user.email === 'leeeugene1574@gmail.com';
                const isTester = user && user.email.includes('@eugeneevons.com');
                
                if (!online && !isAdmin && !isTester) {
                    maintenance.classList.remove('hidden');
                    if (user) signOut(auth);
                } else {
                    maintenance.classList.add('hidden');
                    if(user) {
                        document.getElementById('auth-screen').classList.add('hidden');
                        document.getElementById('app-screen').classList.remove('hidden');
                    }
                }
            });
        });

        window.authGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
</body>
</html>
