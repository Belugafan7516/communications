<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>// TERM-CHAT 10.8 \</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --term-green: #22c55e;
            --term-yellow: #eab308;
            --term-bg: #050505;
            --term-glow: 0 0 10px rgba(34, 197, 94, 0.4);
            --term-alert: #ef4444;
        }

        html, body {
            height: 100%; width: 100%; margin: 0; padding: 0;
            background: var(--term-bg); color: var(--term-green);
            font-family: 'Courier New', monospace;
            overflow: hidden; position: fixed; inset: 0;
        }

        .scanline::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        
        .neon-border { border: 1px solid var(--term-green); box-shadow: var(--term-glow); }
        .alert-border { border: 1px solid var(--term-alert); box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        .custom-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #001100; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #15803d; border-radius: 2px; }
        
        .btn-base {
            @apply border px-3 py-1 text-[10px] font-bold uppercase transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer select-none active:scale-95;
        }
        .btn-green { @apply border-green-600 text-green-500 hover:bg-green-600 hover:text-black; }
        .btn-red { @apply border-red-600 text-red-500 hover:bg-red-600 hover:text-black; }
        .btn-yellow { @apply border-yellow-600 text-yellow-500 hover:bg-yellow-600 hover:text-black; }
        
        .user-item { @apply p-2 border-l-2 border-transparent transition-all cursor-pointer flex items-center gap-3 bg-green-900/5 mb-1; }
        .user-item:hover { @apply bg-green-900/20 pl-3; }
        .user-item.active { @apply bg-green-900/30 border-green-500 pl-3; }

        .msg-anim { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .modal-anim { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        .ping-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); border-color: #eab308 !important; background-color: rgba(234, 179, 8, 0.1) !important; }

        @media print {
            body * { visibility: hidden; }
            body { background: white !important; color: black !important; }
            .scanline::before { display: none; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; height: 100%; padding: 40px; background: white; z-index: 9999; }
        }
    </style>
</head>
<body class="scanline">

    <div id="loading" class="absolute inset-0 bg-black z-[100] flex flex-col items-center justify-center text-center">
        <div class="text-2xl font-bold animate-pulse text-green-500">[ SYSTEM_BOOT_v10.8 ]</div>
        <div id="loading-txt" class="text-[10px] text-green-800 mt-2 font-mono uppercase tracking-[0.2em]">Checking Parameters...</div>
    </div>

    <!-- TESTER DASHBOARD -->
    <div id="tester-dashboard" class="hidden fixed top-2 right-2 z-[200] bg-black/95 border border-yellow-600 p-3 shadow-lg w-64 max-h-[60vh] flex flex-col modal-anim">
        <div class="flex items-center justify-between border-b border-yellow-800 pb-2 mb-2">
            <h3 class="text-yellow-500 font-bold text-[10px] uppercase">TEST_SUITE</h3>
            <button onclick="endTestSession()" class="text-red-500 hover:text-white text-[9px] font-bold border border-red-900 px-2 bg-red-900/10">[ WIPE ]</button>
        </div>
        <div class="text-[9px] text-zinc-400 mb-2">ID: <span id="test-id-display" class="text-green-400 font-mono">INIT...</span></div>
        <div class="flex-1 overflow-y-auto custom-scroll border border-zinc-800 bg-zinc-900/50 p-2 h-24 mb-2">
            <ul id="test-logs" class="space-y-1 font-mono text-[8px] text-zinc-300"></ul>
        </div>
        <button onclick="exportTestLogs()" class="w-full border border-yellow-600 text-yellow-500 hover:bg-yellow-600 hover:text-black text-[9px] font-bold py-1 uppercase">[ EXPORT LOGS ]</button>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="hidden absolute inset-0 z-50 bg-black flex items-center justify-center p-4 overflow-y-auto">
        <div class="w-full max-w-sm neon-border p-8 bg-black modal-anim my-auto">
            <h1 class="text-4xl font-black text-center mb-2 tracking-tighter">TERM-CHAT</h1>
            <div id="auth-landing" class="space-y-4">
                <button onclick="authGoogle()" class="w-full btn-base btn-green py-4"><i class="fab fa-google"></i> ACCESS_VIA_GOOGLE</button>
                <button onclick="showEmailAuth()" class="w-full btn-base border-green-800 text-green-600 py-3"><i class="fas fa-envelope"></i> ACCESS_VIA_CREDENTIALS</button>
            </div>
            <form id="auth-email-form" class="hidden space-y-4" onsubmit="handleEmailSubmit(event)">
                <button type="button" onclick="showLanding()" class="text-[10px] mb-2">&lt;&lt; BACK</button>
                <input type="email" id="email-input" class="w-full bg-black border border-green-900 p-3 text-green-500 text-xs" placeholder="EMAIL" required>
                <input type="password" id="password-input" class="w-full bg-black border border-green-900 p-3 text-green-500 text-xs" placeholder="KEY" required>
                <button type="submit" class="w-full btn-base btn-green py-3 mt-4">VALIDATE</button>
            </form>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app-screen" class="hidden flex h-full w-full relative overflow-hidden">
        <div id="sidebar" class="hidden md:flex flex-col w-72 border-r border-green-900 bg-black h-full shrink-0 absolute md:relative z-40">
            <div class="p-4 border-b border-green-900 bg-zinc-950 shrink-0">
                <div id="my-id-display" class="text-xs font-black truncate uppercase text-green-400">ID_PENDING</div>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll">
                <div id="channel-list" class="space-y-0.5 px-2 py-2"></div>
                <div id="user-list" class="space-y-0.5 px-2 py-2"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-black relative min-w-0 h-full">
            <div id="msg-container" class="flex-1 min-h-0 overflow-y-auto p-4 space-y-4 custom-scroll scroll-smooth relative"></div>

            <div class="p-3 border-t border-green-900 bg-zinc-950 shrink-0 z-20">
                <!-- Markdown Controls -->
                <div class="flex gap-1 mb-2">
                    <button type="button" onclick="insertMarkdown('**', '**')" class="btn-base border-green-900 text-green-700 hover:text-green-400 px-2 py-0.5 text-[8px] font-bold">B</button>
                    <button type="button" onclick="insertMarkdown('*', '*')" class="btn-base border-green-900 text-green-700 hover:text-green-400 px-2 py-0.5 text-[8px] italic font-bold">I</button>
                    <button type="button" onclick="insertMarkdown('`', '`')" class="btn-base border-green-900 text-green-700 hover:text-green-400 px-2 py-0.5 text-[8px] font-mono">CODE</button>
                    <button type="button" onclick="insertMarkdown('[', '](url)')" class="btn-base border-green-900 text-green-700 hover:text-green-400 px-2 py-0.5 text-[8px] font-bold">URL</button>
                </div>
                
                <form onsubmit="sendMessage(event)" class="flex gap-2 max-w-5xl mx-auto items-center">
                    <span class="font-bold text-lg text-green-500 animate-pulse">&gt;</span>
                    <input id="msg-input" type="text" class="flex-1 bg-transparent border-none outline-none text-sm font-mono placeholder-green-900 uppercase" placeholder="TRANSMIT_DATA..." autocomplete="off">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="text-green-800 hover:text-green-500 px-3 py-1 border border-green-900 text-[10px] rounded"><i class="fas fa-image"></i></button>
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(this)">
                    <button type="submit" class="btn-base btn-green px-4">EXEC</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, deleteUser, updatePassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, setDoc, doc, getDoc, getDocs, query, orderBy, deleteDoc, updateDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBaczro2aBxwQVElAwgM3qhlMb3C7OmBKI",
            authDomain: "communiacationtor.firebaseapp.com",
            projectId: "communiacationtor",
            storageBucket: "communiacationtor.firebasestorage.app",
            messagingSenderId: "493961543278",
            appId: "1:493961543278:web:3b2e092de12d8acf01f07f",
            measurementId: "G-EQNY39VP5Q"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // --- MARKDOWN HELPER ---
        window.insertMarkdown = (prefix, suffix) => {
            const input = document.getElementById('msg-input');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            const selected = text.substring(start, end);
            
            const replacement = prefix + selected + suffix;
            input.value = text.substring(0, start) + replacement + text.substring(end);
            
            input.focus();
            input.setSelectionRange(start + prefix.length, start + prefix.length + selected.length);
        };

        // --- AUTH & APP LOGIC (Abbreviated for brevity) ---
        onAuthStateChanged(auth, async (user) => {
            const loading = document.getElementById('loading');
            const authScreen = document.getElementById('auth-screen');
            const appScreen = document.getElementById('app-screen');

            if (user) {
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                loading.classList.add('hidden');
                document.getElementById('my-id-display').innerText = user.displayName || 'GUEST';
            } else {
                appScreen.classList.add('hidden');
                authScreen.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        });

        window.authGoogle = async () => { try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { console.error(e); } };
        window.showEmailAuth = () => { document.getElementById('auth-landing').classList.add('hidden'); document.getElementById('auth-email-form').classList.remove('hidden'); };
        window.showLanding = () => { document.getElementById('auth-email-form').classList.add('hidden'); document.getElementById('auth-landing').classList.remove('hidden'); };
        window.handleEmailSubmit = async (e) => { e.preventDefault(); const em=document.getElementById('email-input').value, pw=document.getElementById('password-input').value; try { await signInWithEmailAndPassword(auth,em,pw); } catch(e) { alert("Invalid credentials."); } };
        
        window.sendMessage = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            try {
                await addDoc(collection(db, 'messages'), { text, uid: auth.currentUser.uid, nickname: auth.currentUser.displayName, timestamp: serverTimestamp(), channel: 'global' });
                input.value = '';
            } catch(e) { console.error(e); }
        };
    </script>
</body>
</html>
