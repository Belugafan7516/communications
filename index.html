<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERM-CHAT 10.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-500 font-mono h-screen flex flex-col items-center justify-center">

    <!-- DEBUGGER -->
    <div id="status" class="text-[10px] text-green-800 mb-4 uppercase">INITIALIZING_KERNEL...</div>

    <!-- MAINTENANCE SCREEN -->
    <div id="maintenance-screen" class="hidden absolute inset-0 z-50 bg-black flex flex-col items-center justify-center">
        <h1 class="text-4xl font-bold text-yellow-500">MAINTENANCE_MODE</h1>
        <p class="text-zinc-600 mt-2">SYSTEM_OFFLINE</p>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="w-full max-w-sm border border-green-900 p-8">
        <h1 class="text-2xl font-bold mb-6 text-center">TERM-CHAT LOGIN</h1>
        <input id="email" type="email" placeholder="EMAIL" class="w-full bg-black border border-green-900 p-2 mb-2 text-xs outline-none">
        <input id="pass" type="password" placeholder="KEY" class="w-full bg-black border border-green-900 p-2 mb-4 text-xs outline-none">
        <button onclick="doLogin()" class="w-full border border-green-600 p-2 text-xs hover:bg-green-600 hover:text-black">VALIDATE</button>
        <button onclick="doGoogle()" class="w-full border border-green-900 p-2 mt-2 text-xs hover:bg-green-900">GOOGLE_AUTH</button>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden w-full h-full flex flex-col">
        <div class="p-4 border-b border-green-900">TERM-CHAT_ACTIVE</div>
        <div id="msg-container" class="flex-1 overflow-y-auto p-4"></div>
        <div class="p-4 border-t border-green-900">
            <input id="msg-input" type="text" class="w-full bg-transparent outline-none border-b border-green-900" placeholder="TYPE...">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // REPLACE THIS WITH YOUR ACTUAL CONFIG FROM FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const status = document.getElementById('status');

        window.doLogin = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert(err.message); }
        };

        window.doGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                return;
            }

            status.innerText = "CHECKING_DIAGNOSTICS...";
            
            try {
                const snap = await getDoc(doc(db, '_diagnostics', 'online'));
                const isOnline = snap.exists() ? snap.data().online : true;
                const isAdmin = user.email === 'leeeugene1574@gmail.com';

                if (!isOnline && !isAdmin) {
                    document.getElementById('maintenance-screen').classList.remove('hidden');
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.add('hidden');
                    status.innerText = "ACCESS_RESTRICTED";
                    signOut(auth);
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    status.innerText = "UPLINK_STABLE";
                }
            } catch (err) {
                console.error(err);
                status.innerText = "DIAGNOSTIC_ERROR (Proceeding)";
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
